<!DOCTYPE html>

        <img src="./img/icons/icon.png" alt="Logotipo" class="logotipo">

        <div class="areaMenuMobile">
            <button class="menuMobileBtn" id="btn">&#9776</button>

1 let <span class="high">pessoa</span> = {

6 
7 pessoa.skills.push(“<span class="high">Aprender++</span>”)

    <script src="./js/menuMobile.js"></script>
